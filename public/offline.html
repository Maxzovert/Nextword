<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0075de" />
  <title>WordNest | Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Inter, -apple-system, system-ui, sans-serif;
      background: #f6f5f4;
      color: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: max(24px, env(safe-area-inset-top));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .card {
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 12px;
      padding: 32px 24px;
      max-width: 360px;
      text-align: center;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: #615d59; line-height: 1.5; margin-bottom: 20px; }
    button {
      background: #0075de;
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 12px 24px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're offline</h1>
    <p>WordNest needs a connection to load new pages. Your saved words are still on this device.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
